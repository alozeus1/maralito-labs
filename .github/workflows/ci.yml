name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------- Quality gates (blocking) ----------------
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0
        with: { version: 10.34.4 }
      - uses: actions/setup-node@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      - name: Raw DB client guard
        run: pnpm check:db-imports
      - name: Client Stripe boundary guard
        run: pnpm check:client-stripe
      - name: Unit tests
        run: pnpm test
      - name: Build
        run: pnpm build
      # Phase 1+ (wired as stubs now, enforced later):
      #   - migration check on Supabase branch
      #   - integration + TENANT-ISOLATION tests (blocking)
      #   - e2e (Playwright on preview)
      #   - AI eval/regression (prohibited false-clear = 0) when agents change

  # ---------------- Security gates (blocking) ----------------
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { fetch-depth: 0 }
      - name: gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  sast:
    runs-on: ubuntu-latest
    container: { image: returntocorp/semgrep }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: semgrep (SAST)
        run: semgrep ci --config auto
        env:
          SEMGREP_RULES: 'p/typescript p/react p/secrets p/owasp-top-ten'

  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0
        with: { version: 10.34.4 }
      - uses: actions/setup-node@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit (high+)
        run: pnpm audit --audit-level=high
      - name: osv-scanner (dependency vulnerabilities)
        uses: google/osv-scanner-action/osv-scanner-action@8dc09193bb540e09b23da07ad7e30bd33bf87018 # v2.3.8
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml

  # IaC scan (checkov/tfsec) added in Phase 1 once infra/ Terraform exists.

# Hardening notes (Phase 0+): pin all actions by commit SHA; protect main; require all gates.
# OIDC short-lived cloud creds (no static keys). No paid security platforms in MVP.
