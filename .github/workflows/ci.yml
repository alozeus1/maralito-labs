name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------- Quality gates (blocking) ----------------
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      - name: Raw DB client guard
        run: pnpm check:db-imports
      - name: Client Stripe boundary guard
        run: pnpm check:client-stripe
      - name: Unit tests
        run: pnpm test
      - name: Build
        run: pnpm build
      # Phase 1+ (wired as stubs now, enforced later):
      #   - migration check on Supabase branch
      #   - integration + TENANT-ISOLATION tests (blocking)
      #   - e2e (Playwright on preview)
      #   - AI eval/regression (prohibited false-clear = 0) when agents change

  # ---------------- Security gates (blocking) ----------------
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  sast:
    runs-on: ubuntu-latest
    container: { image: returntocorp/semgrep }
    steps:
      - uses: actions/checkout@v4
      - name: semgrep (SAST)
        run: semgrep ci --config auto
        env:
          SEMGREP_RULES: "p/typescript p/react p/secrets p/owasp-top-ten"

  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit (high+)
        run: pnpm audit --audit-level=high
      - name: osv-scanner (dependency vulnerabilities)
        uses: google/osv-scanner-action@v1
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml

  # IaC scan (checkov/tfsec) added in Phase 1 once infra/ Terraform exists.

# Hardening notes (Phase 0+): pin all actions by commit SHA; protect main; require all gates.
# OIDC short-lived cloud creds (no static keys). No paid security platforms in MVP.
