packages:
  - 'apps/*'
  - 'packages/*'

# Supply-chain controls supported by the pinned pnpm 10 release.
minimumReleaseAge: 10080
trustPolicy: no-downgrade
# undici-types 6.21.0 is an old, integrity-pinned type-only package whose
# historical npm publish lacks trust metadata; keep the exception version-scoped.
trustPolicyExclude:
  - 'undici-types@6.21.0'
blockExoticSubdeps: true

overrides:
  esbuild: 0.25.12
  postcss: 8.5.10
  vite: 6.4.3

allowBuilds:
  esbuild: true
